spring:
  application:
    name: service-desk

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate      # validate / update / create-drop / none
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  jackson:
    serialization:
      INDENT_OUTPUT: true
    property-naming-strategy: SNAKE_CASE

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml