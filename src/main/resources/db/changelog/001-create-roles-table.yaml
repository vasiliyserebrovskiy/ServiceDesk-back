databaseChangeLog:
  - changeSet:
      id: 1
      author: sitool
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: default_role
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false