databaseChangeLog:
  - changeSet:
      id: 5
      author: sitool
      changes:
        - createTable:
            tableName: users_groups
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: group_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            columnNames: user_id, group_id
            tableName: users_groups
            constraintName: pk_users_groups
        - addForeignKeyConstraint:
            baseTableName: users_groups
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_users_groups_users
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: users_groups
            baseColumnNames: group_id
            referencedTableName: groups
            referencedColumnNames: id
            constraintName: fk_users_groups_groups
            onDelete: CASCADE