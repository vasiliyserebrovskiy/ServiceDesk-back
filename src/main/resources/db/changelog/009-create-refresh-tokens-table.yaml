databaseChangeLog:
  - changeSet:
      id: create-refresh-tokens-table
      author: sitool
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: token_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: revoked
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: device_info
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            baseTableName: refresh_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_refresh_tokens_user
            onDelete: CASCADE

        - addUniqueConstraint:
            tableName: refresh_tokens
            columnNames: token_hash
            constraintName: uk_refresh_token_hash

        - createIndex:
            tableName: refresh_tokens
            indexName: idx_refresh_token_hash
            columns:
              - column:
                  name: token_hash

        - createIndex:
            tableName: refresh_tokens
            indexName: idx_refresh_user_id
            columns:
              - column:
                  name: user_id