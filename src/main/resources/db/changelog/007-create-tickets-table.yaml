databaseChangeLog:
  - changeSet:
      id: 7
      author: sitool
      changes:
        - createTable:
            tableName: tickets
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: ticket_type_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: requester_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: assignee_id
                  type: UUID
                  constraints:
                    nullable: true
              - column:
                  name: group_id
                  type: UUID
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: servicenow_ticket_id
                  type: VARCHAR(20)
                  constraints:
                    nullable: true
              - column:
                  name: category_id
                  type: UUID
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: tickets
            baseColumnNames: ticket_type_id
            referencedTableName: ticket_types
            referencedColumnNames: id
            constraintName: fk_tickets_ticket_types_id
        - addForeignKeyConstraint:
            baseTableName: tickets
            baseColumnNames: requester_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_tickets_requester_id_users
        - addForeignKeyConstraint:
            baseTableName: tickets
            baseColumnNames: assignee_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_tickets_assignee_id_users
        - addForeignKeyConstraint:
            baseTableName: tickets
            baseColumnNames: group_id
            referencedTableName: groups
            referencedColumnNames: id
            constraintName: fk_tickets_groups
        - addForeignKeyConstraint:
            baseTableName: tickets
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_tickets_categories